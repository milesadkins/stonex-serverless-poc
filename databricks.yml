bundle:
  name: tpch_serverless_benchmark

workspace:
  host: ${var.databricks_host}

variables:
  databricks_host:
    description: "Databricks workspace URL"

artifacts:
  tpch_benchmark:
    type: whl
    path: .
    build: uv build --wheel

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    variables:
      databricks_host: ""
  prod:
    mode: production
    variables:
      databricks_host: ""
