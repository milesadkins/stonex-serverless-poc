bundle:
  name: tpch_serverless_benchmark

workspace:
  host: https://adb-7405604918328341.1.azuredatabricks.net

include:
  - resources/*.yml

variables:
  benchmark_run_id:
    description: "Unique identifier for this benchmark run (e.g. 20260305_143000)"
    default: "default"
  results_catalog:
    description: "Unity Catalog catalog for the benchmark results table"
    default: "main"
  results_schema:
    description: "Schema for the benchmark results table"
    default: "default"
  node_type_id:
    description: "Azure VM SKU for classic compute clusters"
    default: "Standard_D8s_v3"
  num_workers:
    description: "Number of worker nodes for classic compute clusters"
    default: "2"
  spark_version:
    description: "Databricks Runtime version for classic compute"
    default: "15.4.x-scala2.12"

targets:
  dev:
    mode: development
    default: true
  prod:
    mode: production
