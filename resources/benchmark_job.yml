resources:
  jobs:
    tpch_serverless_perf_optimized:
      name: "tpch_benchmark_serverless_perf_optimized"
      tags:
        project: "tpch-benchmark"
        compute_type: "serverless_perf_optimized"
      performance_target: "PERFORMANCE_OPTIMIZED"
      tasks:
        - task_key: run_benchmark
          notebook_task:
            notebook_path: ../notebooks/run_benchmark.py
            source: WORKSPACE
            base_parameters:
              compute_type: "serverless_perf_optimized"
              benchmark_run_id: "${var.benchmark_run_id}"
              results_catalog: "${var.results_catalog}"
              results_schema: "${var.results_schema}"
              node_type_id: "${var.node_type_id}"
              num_workers: "${var.num_workers}"

    tpch_serverless_cost_optimized:
      name: "tpch_benchmark_serverless_cost_optimized"
      tags:
        project: "tpch-benchmark"
        compute_type: "serverless_cost_optimized"
      performance_target: "STANDARD"
      tasks:
        - task_key: run_benchmark
          notebook_task:
            notebook_path: ../notebooks/run_benchmark.py
            source: WORKSPACE
            base_parameters:
              compute_type: "serverless_cost_optimized"
              benchmark_run_id: "${var.benchmark_run_id}"
              results_catalog: "${var.results_catalog}"
              results_schema: "${var.results_schema}"
              node_type_id: "${var.node_type_id}"
              num_workers: "${var.num_workers}"

    tpch_classic_on_demand:
      name: "tpch_benchmark_classic_on_demand"
      tags:
        project: "tpch-benchmark"
        compute_type: "classic_on_demand"
      tasks:
        - task_key: run_benchmark
          notebook_task:
            notebook_path: ../notebooks/run_benchmark.py
            source: WORKSPACE
            base_parameters:
              compute_type: "classic_on_demand"
              benchmark_run_id: "${var.benchmark_run_id}"
              results_catalog: "${var.results_catalog}"
              results_schema: "${var.results_schema}"
              node_type_id: "${var.node_type_id}"
              num_workers: "${var.num_workers}"
          new_cluster:
            spark_version: "${var.spark_version}"
            azure_attributes:
              first_on_demand: 3
              availability: "ON_DEMAND_AZURE"
            node_type_id: "${var.node_type_id}"
            num_workers: ${var.num_workers}
            custom_tags:
              "purpose": "tpch-benchmark"

    tpch_classic_spot:
      name: "tpch_benchmark_classic_spot"
      tags:
        project: "tpch-benchmark"
        compute_type: "classic_spot"
      tasks:
        - task_key: run_benchmark
          notebook_task:
            notebook_path: ../notebooks/run_benchmark.py
            source: WORKSPACE
            base_parameters:
              compute_type: "classic_spot"
              benchmark_run_id: "${var.benchmark_run_id}"
              results_catalog: "${var.results_catalog}"
              results_schema: "${var.results_schema}"
              node_type_id: "${var.node_type_id}"
              num_workers: "${var.num_workers}"
          new_cluster:
            spark_version: "${var.spark_version}"
            azure_attributes:
              first_on_demand: 1
              availability: "SPOT_WITH_FALLBACK_AZURE"
              spot_bid_max_price: -1
            node_type_id: "${var.node_type_id}"
            num_workers: ${var.num_workers}
            custom_tags:
              "purpose": "tpch-benchmark"
